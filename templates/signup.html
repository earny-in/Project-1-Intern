{% extends 'base.html' %}

{% block title %}Sign Up - Quora Clone{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px;">
    <div class="form-card">
        <h1 class="auth-title">Sign Up</h1>
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Your full name">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="Your email address">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="At least 6 characters">
            </div>
            <button type="submit" class="btn-primary">Create Account</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </div>
    </div>
</div>
{% endblock %}
